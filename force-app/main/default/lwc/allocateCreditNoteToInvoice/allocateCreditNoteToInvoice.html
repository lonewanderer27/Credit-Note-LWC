<template>
    <div class="allocate-credit-container">
        <div class="allocate-credit-header">
            <h1>Apply Credit</h1>
        </div>
        <hr />
        <p><em>Allocate outstanding credit to <strong>{invoiceId}</strong></em></p>
        <p>Select the Credit Note(s) to be applied to the Invoice and specify the Amount to Credit</p>

        <table class="allocate-credit-table">
            <thead>
                <tr>
                    <th></th>
                    <th>Credit Note</th>
                    <th>Created Date</th>
                    <th>Amount Available</th>
                    <th>Amount to Credit</th>
                </tr>
            </thead>
            <tbody>
                <template for:each={availableCreditNotes} for:item="creditNote">
                    <tr key={creditNote.Id}>
                        <td>
                            <input type="checkbox" data-id={creditNote.Id} onchange={handleCheckboxChange}
                                checked={creditNote.isChecked} aria-label="Select credit note" />
                        </td>
                        <td>
                            <a href="#">{creditNote.Name}</a>
                        </td>
                        <td>{creditNote.formattedDate}</td>
                        <td>${creditNote.availableAmount}</td>
                        <td>
                            <div class="allocate-credit-input-wrapper">
                                <span class="dollar-prefix">$</span>
                                <input type="number" class="allocate-credit-amount-input"
                                    value={creditNote.allocatedAmount} max={creditNote.availableAmount}
                                    onchange={handleAllocationChange} min="0" step="0.01"
                                    disabled={creditNote.isDisabled} title={creditNote.inputTitle}
                                    data-id={creditNote.Id} aria-label="Amount to credit" />
                            </div>
                        </td>
                    </tr>
                </template>
            </tbody>
        </table>

        <div class="allocate-credit-summary">
            <div class="allocate-credit-summary-table">
                <div class="allocate-credit-summary-row">
                    <span class="allocate-credit-summary-label">Amount Due on Invoice</span>
                    <span class="allocate-credit-summary-value">{formattedRemainingDueOnInvoice}</span>
                </div>
                <div class="allocate-credit-summary-row">
                    <span class="allocate-credit-summary-label">Total Amount to Credit</span>
                    <span class="allocate-credit-summary-value">{formattedTotalAllocated}</span>
                </div>
                <hr class="allocate-credit-summary-divider" />
                <div class="allocate-credit-summary-row">
                    <span class="allocate-credit-summary-label">Remaining Due on Invoice</span>
                    <span class="allocate-credit-summary-value">{formattedComputedRemainingDue}</span>
                </div>
            </div>
        </div>

        <div style="text-align:center;">
            <button aria-label="Apply credit to invoice" class={applyButtonClass} title={applyButtonTooltip}
                onclick={handleApply}>
                Apply
            </button>
        </div>
    </div>
</template>
